<div class="modal-dialog modal-lg" role="document">
    <div class="modal-content shadow-lg border-0">

        <!-- ENCABEZADO -->
        <div class="modal-header bg-primary text-white">
            <div>
                <h5 class="modal-title mb-0">Ver Repatriación Titular Inactivo</h5>
                <h6 class="text-light mb-0">Titular - {{ objRepatriacionTitular.asociado.nombre }} {{ objRepatriacionTitular.asociado.apellido }}</h6>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <!-- CUERPO -->
        <div class="modal-body">

            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-light">
                    <h6 class="mb-0 text-secondary">Información de la Repatriación</h6>
                </div>

                <div class="card-body">
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Fecha Ingreso:</label>
                            <input type="text" class="form-control" value="{{ objRepatriacionTitular.fechaRepatriacion|date:'d/m/Y' }}" readonly>
                        </div>

                        <div class="col-md-6 campo-activa">
                            <label class="form-label">Pais:</label>
                            <input type="text" class="form-control" value="{{ objRepatriacionTitular.paisRepatriacion }}" readonly>
                        </div>

                        <div class="col-md-6 campo-activa">
                            <label class="form-label">Ciudad:</label>
                            <input type="text" class="form-control" value="{{ objRepatriacionTitular.ciudadRepatriacion }}" readonly>
                        </div>

                        <div class="col-md-6 campo-activa">
                            <label class="form-label">Primer Mes Cobro:</label>
                            <input type="text" class="form-control" value="{{ objRepatriacionTitular.primerMes }}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Fecha Retiro:</label>
                            <input type="date" class="form-control" value="{{ objRepatriacionTitular.fechaRetiro|date:'Y-m-d' }}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Último Mes Cobro:</label>
                            <input type="text" class="form-control" value="{{ objRepatriacionTitular.ultimoMes }}" readonly>
                        </div>

                        {% if objRepatriacionTitular.anulado %}
                            <div class="col-md-6">
                                <label class="form-label">Estado:</label>
                                <input type="text" class="form-control" value="Anulado (Sin Cobro)" readonly>
                            </div>
                        {% endif %}

                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>
