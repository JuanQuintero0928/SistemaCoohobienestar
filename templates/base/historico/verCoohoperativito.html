<div class="modal-dialog modal-lg" role="document">
    <div class="modal-content shadow-lg border-0">

        <!-- ENCABEZADO -->
        <div class="modal-header bg-primary text-white">
            <div>
                <h5 class="modal-title mb-0">Ver Coohoperativito Inactivo</h5>
                <h6 class="text-light mb-0">Titular - {{ objCoohoperativito.asociado.nombre }} {{ objCoohoperativito.asociado.apellido }}</h6>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <!-- CUERPO -->
        <div class="modal-body">

            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header">
                    <h6 class="mb-0">Información del Coohoperativito</h6>
                </div>

                <div class="card-body">
                    <div class="row g-3">

                        <div class="row g-3">
                        
                            <div class="col-md-6">
                                <label class="form-label">Nombre:</label>
                                <input type="text" class="form-control" value="{{ objCoohoperativito.nombre }}" readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Apellido:</label>
                                <input type="text" class="form-control" value="{{ objCoohoperativito.apellido }}" readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tipo Documento:</label>
                                <input type="text" class="form-control" value="{{ objCoohoperativito.tipoDocumento }}" readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Número Documento:</label>
                                <input type="text" class="form-control" value="{{ objCoohoperativito.numDocumento }}" readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Fecha Nacimiento:</label>
                                <input type="text" class="form-control" value="{{ objCoohoperativito.fechaNacimiento|date:'d/m/Y' }}" readonly>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Fecha Ingreso:</label>
                            <input type="text" class="form-control" value="{{ objCoohoperativito.fechaIngreso|date:'d/m/Y' }}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Primer Mes Cobro:</label>
                            <input type="text" class="form-control" value="{{ objCoohoperativito.primerMes }}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Fecha Retiro:</label>
                            <input type="text" class="form-control" value="{{ objCoohoperativito.fechaRetiro|date:'d/m/Y' }}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Último Mes Cobro:</label>
                            <input type="text" class="form-control" value="{{ objCoohoperativito.ultimoMes }}" readonly>
                        </div>



                        {% if objCoohoperativito.anulado %}
                            <div class="col-md-6">
                                <label class="form-label">Estado:</label>
                                <input type="text" class="form-control" value="Anulado (Sin Cobro)" readonly>
                            </div>
                        {% endif %}

                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>
