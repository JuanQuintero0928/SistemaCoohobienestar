{% load static %}
<nav class="navbar navbar-dark bg-dark border-bottom border-dark-subtle sticky-top shadow-sm layout-navbar">

    <!-- Toggle sidebar móvil -->
    <button class="btn btn-link text-white me-2 d-lg-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarOffcanvas"
            aria-controls="sidebarOffcanvas"
            aria-label="Abrir menú">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
    </button>

    <!-- Toggle sidebar desktop -->
    <button class="btn btn-link text-white me-2 d-none d-lg-inline-flex"
            type="button"
            id="sidebarToggleDesktop"
            aria-label="Contraer menú">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-layout-sidebar" viewBox="0 0 16 16">
            <path d="M0 3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm5-1v12h9a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zM4 2H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h2z"/>
        </svg>
    </button>

    <!-- Brand -->
    <a class="navbar-brand me-auto" href="{% url 'dashboard' %}">Coohobienestar</a>

    <!-- Acciones derecha -->
    <div class="d-flex align-items-center gap-2 pe-2">

        <!-- Toggle dark/light mode -->
        <button id="themeToggle" class="btn btn-link p-0 d-flex align-items-center justify-content-center"
            id="themeToggle"
            aria-label="Cambiar tema">
            <span id="themeIcon"></span>
        </button>
        

        <!-- Menú usuario -->
        <div class="dropdown">
            <a class="btn btn-link text-white dropdown-toggle text-decoration-none"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-list-ul" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m-3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
                </svg>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-3 p-2"
                style="min-width: 280px;"
                aria-labelledby="userDropdown">

                <!-- Info del usuario -->
                <li class="px-3 py-2 mb-2">
                    <div class="d-flex align-items-center gap-2">
                        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center" 
                                style="width: 40px; height: 40px;">
                            <span class="text-white fw-bold">{{ request.user.username|slice:":1"|upper }}</span>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-semibold">{{ request.user }}</div>
                            <div class="text-muted small">{{ request.user.first_name|title }} {{ request.user.last_name|title }}</div>
                        </div>
                    </div>
                </li>

                <li><hr class="dropdown-divider"></li>

                <!-- Cerrar sesión -->
                <li>
                    <form method="post" action="{% url 'logout_admin' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="dropdown-item rounded-2 py-2 text-danger d-flex align-items-center gap-2 fw-semibold">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-box-arrow-left" viewBox="0 0 16 16">
                                <path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v2a.5.5 0 0 1-1 0v-2A1.5 1.5 0 0 1 6.5 2h8A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 5 12.5v-2a.5.5 0 0 1 1 0z"/>
                                <path fill-rule="evenodd" d="M.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L1.707 7.5H10.5a.5.5 0 0 1 0 1H1.707l2.147 2.146a.5.5 0 0 1-.708.708z"/>
                            </svg>
                            Cerrar Sesión
                        </button>
                    </form>
                </li>
                
            </ul>
        </div>
    </div>
</nav>
